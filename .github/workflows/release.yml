name: CI

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runs-on }}
    strategy:
      matrix:
        include:
          - runs-on: ubuntu-latest
            target: x86_64-linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Raylib 5.5
        run: |
          wget -q https://github.com/raysan5/raylib/releases/download/5.5/raylib-5.5_linux_amd64.tar.gz
          tar -xzf raylib-5.5_linux_amd64.tar.gz
          echo "RAYLIB=$PWD/raylib-5.5_linux_amd64" >> $GITHUB_ENV

      - name: Check Raylib
        run: |
          ls -la "$RAYLIB/include"
          ls -la "$RAYLIB/lib"
